name: naver-find-text

# 소재·확장·키워드에서 특정 단어 찾기(+삭제). 기본 '무료'.
on:
  workflow_dispatch:
    inputs:
      term:
        description: "찾을 단어 (기본 무료)"
        required: false
        default: "무료"
      apply:
        description: "삭제? (no=스캔만 / yes=삭제)"
        required: true
        default: "no"
      only_on:
        description: "켜진 것만? (no=전체 권장)"
        required: false
        default: "no"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 문구 스캔/삭제
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          TERM:    ${{ inputs.term }}
          APPLY:   ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_ON: ${{ inputs.only_on == 'yes' && '1' || '0' }}
        run: python naver_find_text.py
