name: qna-autopost

# QnA 자동 생성. 매일 스케줄로 '생성만'(dry_run=게시 안 함) 돌려 대시보드 '자동 게시' 검수
# 대기열에 쌓는다. 담당자가 대시보드에서 확인 후 '승인·게시'를 눌러야 홈페이지에 올라간다
# (대표님 지시로 한 달간 전건 검수). 수동 실행 시 dry_run=false로 하면 즉시 게시도 가능.
on:
  workflow_dispatch:
    inputs:
      n:
        description: "하루 생성 개수(형사2·성범죄2·나머지1 계획 기준 15)"
        required: false
        default: "15"
      dry_run:
        description: "게시 안 하고 검수 대기열에만? (true/false)"
        required: false
        default: "true"
      cats:
        description: "특정 카테고리만 생성(쉼표구분, 빠진 분야 보충용). 비우면 계획대로."
        required: false
        default: ""
  # 주력: GitHub 자체 스케줄(서버측 실행 → Claude 세션 의존 없음, '안 도는 날' 방지).
  # 무료플랜은 지연될 수 있으나 원고는 검수 대기열에 쌓이므로 몇 시간 늦어도 무방.
  # 정각(:00)이 지연이 가장 심해 :20에 건다. 이중 안전망으로 Claude Routine이
  # 몇 시간 뒤 '오늘 실행 없으면 그때만' 눌러 보강한다(중복은 검수에서 걸러냄).
  schedule:
    - cron: "20 0 * * *"   # 매일 00:20 UTC ≒ 09:20 KST 근방

concurrency:
  group: qna-autopost
  cancel-in-progress: false

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install anthropic requests beautifulsoup4 google-cloud-bigquery
      - name: 자동 생성·게시
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          QNA_ID: ${{ secrets.QNA_ID }}
          QNA_PW: ${{ secrets.QNA_PW }}
          # schedule로 자동 실행될 땐 inputs가 비므로 기본값 사용(N=15, DRYRUN=1)
          AUTOPOST_N: ${{ github.event.inputs.n || '15' }}
          AUTOPOST_DRYRUN: ${{ (github.event.inputs.dry_run == 'false') && '0' || '1' }}
          AUTOPOST_CATS: ${{ github.event.inputs.cats || '' }}
        run: python qna_autopost.py
