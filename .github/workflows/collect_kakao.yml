name: collect-kakao

# 카카오모먼트 광고 일별 성과를 매일 수집 → BigQuery(ad_etc, media='카카오모먼트').
# 공식 오픈API(apis.moment.kakao.com). 인증은 refresh_token→access_token(비즈니스 토큰).
# ⚠️ 최초 1회는 workflow_dispatch로 수동 실행해 응답/필드를 확인한 뒤 스케줄을 켤 것.
#    검증 전엔 스케줄을 꺼둔다(시크릿 없이 매일 실패하는 소음 방지). 성공 확인 후 아래 schedule 주석 해제.
on:
  # schedule:
  #   - cron: "20 20 * * *"   # UTC 20:20 = KST 05:20 (모비온 05:10 뒤, ad_etc 순차 쓰기) — 검증 후 활성화
  workflow_dispatch: {}

concurrency:
  group: bq-ad-etc-write       # ad_etc 동시 쓰기 방지(메타·모비온과 공유)
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests pandas google-cloud-bigquery google-auth pyarrow db-dtypes
      - name: 카카오모먼트 수집
        env:
          KAKAO_REST_API_KEY:   ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN:  ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_AD_ACCOUNT_ID:  ${{ secrets.KAKAO_AD_ACCOUNT_ID }}
          KAKAO_START_DATE:     ${{ secrets.KAKAO_START_DATE }}
          GCP_SA_JSON:          ${{ secrets.GCP_SA_JSON }}
        run: python collect_kakao.py
