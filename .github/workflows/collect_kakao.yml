name: collect-kakao

# 카카오모먼트 광고 일별 성과 수동 수집 → BigQuery(ad_etc, media='카카오모먼트').
# 정기 수집은 collect_all이 담당. 이건 수동 재실행용(dispatch)만.
# 인증: 비즈니스 토큰(KAKAO_BIZ_TOKEN, 장기 재사용). 발급은 kakao_biztoken.yml이 1회 수행.
on:
  workflow_dispatch: {}

concurrency:
  group: bq-ad-etc-write       # ad_etc 동시 쓰기 방지(메타·모비온과 공유)
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests pandas google-cloud-bigquery google-auth pyarrow db-dtypes
      - name: 카카오모먼트 수집
        env:
          KAKAO_BIZ_TOKEN:     ${{ secrets.KAKAO_BIZ_TOKEN }}
          KAKAO_AD_ACCOUNT_ID: ${{ secrets.KAKAO_AD_ACCOUNT_ID }}
          KAKAO_START_DATE:    ${{ secrets.KAKAO_START_DATE }}
          GCP_SA_JSON:         ${{ secrets.GCP_SA_JSON }}
        run: python collect_kakao.py
