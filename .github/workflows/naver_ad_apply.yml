name: naver-ad-apply

# 네이버 XX 저비용 캠페인 소재 개선 적용.
# 소재(제목·설명)=삭제 없이 새 소재 추가 / 확장(추가제목·홍보문구)=기존 삭제 후 교체.
# apply=no(기본): 드라이런(만들/지울 내용만 출력). apply=yes: 실제 적용.
# only_camp: 특정 캠페인만(예: 의료분쟁) — 테스트용. 비우면 XX 전체.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "실제 적용? (no=드라이런 / yes=적용)"
        required: true
        default: "no"
      only_camp:
        description: "특정 캠페인만 (예: 의료분쟁). 비우면 XX 전체"
        required: false
        default: ""
      add_b:
        description: "소재 A/B 둘 다? (yes) / A만 (no)"
        required: false
        default: "yes"
      add_ext:
        description: "추가제목·홍보문구도 교체? (yes/no)"
        required: false
        default: "yes"
      only_on:
        description: "켜진 것만 대상? (yes 권장)"
        required: false
        default: "yes"
      dump:
        description: "확장소재 원본 JSON만 출력(읽기전용 진단)? (yes/no)"
        required: false
        default: "no"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 소재 개선 적용
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          APPLY:     ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_CAMP: ${{ inputs.only_camp }}
          ADD_B:     ${{ inputs.add_b == 'no' && '0' || '1' }}
          ADD_EXT:   ${{ inputs.add_ext == 'no' && '0' || '1' }}
          ONLY_ON:   ${{ inputs.only_on == 'no' && '0' || '1' }}
          DUMP:      ${{ inputs.dump == 'yes' && '1' || '0' }}
        run: python naver_ad_apply.py
