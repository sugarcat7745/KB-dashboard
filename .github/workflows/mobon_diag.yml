name: mobon-diag

# 모비온 계정별 진단(1회성 수동). 각 광고계정의 최근 5일 일별 비용을 합산 전으로 출력.
on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests pandas google-cloud-bigquery google-auth
      - name: 계정별 진단
        env:
          MOBON_ACCOUNTS:   ${{ secrets.MOBON_ACCOUNTS }}
          MOBON_START_DATE: ${{ secrets.MOBON_START_DATE }}
          MOBON_PROXY:      ${{ secrets.MOBON_PROXY }}
          GCP_SA_JSON:      ${{ secrets.GCP_SA_JSON }}
        run: python mobon_diag.py
