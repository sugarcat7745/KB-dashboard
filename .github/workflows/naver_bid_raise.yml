name: naver-bid-raise

# 네이버 키워드 입찰(CPC) 상향 — 전환 기준(고전환 카테고리 여력 키워드).
# 캠페인 예산은 절대 건드리지 않음. bidAmt(CPC)만 변경.
# apply=no(기본): 드라이런. apply=yes: 실제 적용. 켜진 것만 대상.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "실제 적용? (no=드라이런 / yes=적용)"
        required: true
        default: "no"
      only_on:
        description: "켜진 것만 대상? (yes 권장)"
        required: false
        default: "yes"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 입찰 상향
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          APPLY:   ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_ON: ${{ inputs.only_on == 'no' && '0' || '1' }}
        run: python naver_bid_raise.py
