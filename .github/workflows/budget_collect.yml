name: 캠페인 예산·소진 수집

on:
  schedule:
    # KST 09~24시 매시 정각 수집 (UTC 0~15시)
    - cron: '0 0-15 * * *'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests pandas google-cloud-bigquery db-dtypes pyarrow

      - name: GCP 서비스계정 키 생성 (멀티라인 안전)
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > credentials.json

      - name: 키 파일 검증
        run: python -c "import json; json.load(open('credentials.json')); print('OK credentials.json valid JSON')"

      - name: 캠페인 예산 수집 실행
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json
        run: python KB_캠페인예산_수집.py

      - name: 키 파일 정리
        if: always()
        run: rm -f credentials.json
