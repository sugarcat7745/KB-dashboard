name: naver-expand-kw

# 카테고리 대량 조합확장(죄명×의뢰의도접미+서울경기지역) 등록.
on:
  workflow_dispatch:
    inputs:
      only_cat:
        description: "카테고리 (기본 성범죄)"
        required: false
        default: "성범죄"
      apply:
        description: "실제 등록? (no=드라이런 / yes=등록)"
        required: true
        default: "no"
      bid:
        description: "입찰가(원)"
        required: false
        default: "23500"
      region:
        description: "지역조합 포함? (1/0)"
        required: false
        default: "1"
      only_on:
        description: "켜진 것만? (yes 권장)"
        required: false
        default: "yes"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 대량 조합확장
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          APPLY:    ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_CAT: ${{ inputs.only_cat }}
          BID:      ${{ inputs.bid }}
          REGION:   ${{ inputs.region }}
          ONLY_ON:  ${{ inputs.only_on == 'no' && '0' || '1' }}
        run: python naver_expand_kw.py
