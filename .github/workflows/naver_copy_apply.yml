name: naver-copy-apply

# 네이버 비-XX 캠페인 소재 개선 적용 — 세부주제(그룹) 맞춤.
# 소재는 삭제없이 A/B 추가, 추가제목·홍보문구는 기존 삭제 후 교체. 켜진 그룹만.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "실제 적용? (no=드라이런 / yes=적용)"
        required: true
        default: "no"
      only_camp:
        description: "특정 캠페인만 (예: 성범죄). 비우면 전체 비-XX"
        required: false
        default: ""
      add_b:
        description: "소재 A/B 둘 다? (yes/no)"
        required: false
        default: "yes"
      add_ext:
        description: "추가제목·홍보문구도 교체? (yes/no)"
        required: false
        default: "yes"
      only_on:
        description: "켜진 것만? (yes 권장)"
        required: false
        default: "yes"
      verify:
        description: "적용 검증만(읽기전용)? (yes/no)"
        required: false
        default: "no"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 소재 개선 적용
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          APPLY:     ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_CAMP: ${{ inputs.only_camp }}
          ADD_B:     ${{ inputs.add_b == 'no' && '0' || '1' }}
          ADD_EXT:   ${{ inputs.add_ext == 'no' && '0' || '1' }}
          ONLY_ON:   ${{ inputs.only_on == 'no' && '0' || '1' }}
          VERIFY:    ${{ inputs.verify == 'yes' && '1' || '0' }}
        run: python naver_copy_apply.py
