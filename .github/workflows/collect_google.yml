name: collect-google-daily

on:
  schedule:
    # GitHub 무료 플랜은 예약을 수 시간 미룸 → 아침~오전에 여러 번 분산 시도(idempotent라 안전).
    # 구글 Ads는 '어제' 데이터 확정이 느려 시간 두고 여러 번 + 오전 백스톱.
    - cron: "23 21 * * *"   # UTC 21:23 = KST 06:23
    - cron: "13 23 * * *"   # UTC 23:13 = KST 08:13
    - cron: "43 23 * * *"   # UTC 23:43 = KST 08:43
    - cron: "23 0 * * *"    # UTC 00:23 = KST 09:23 (백스톱)
    - cron: "23 1 * * *"    # UTC 01:23 = KST 10:23 (백스톱·확인 직전)
  workflow_dispatch: {}

concurrency:
  group: bq-ad-keyword-write
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install google-ads google-cloud-bigquery pandas pyarrow db-dtypes

      - name: Run collector
        env:
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_LOGIN_CUSTOMER_ID }}
          GOOGLE_CUSTOMER_ID: ${{ secrets.GOOGLE_CUSTOMER_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: python collect_google.py

      # 수집이 실패하면 조용히 넘어가지 않도록 GitHub 이슈로 알림 (수동 실행은 제외)
      - name: 실패 시 알림 이슈
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "⚠️ 구글 수집 실패 ($(date -u +%F))" \
            --body "collect-google-daily 실행이 실패했습니다. 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "이슈 생성 건너뜀"
