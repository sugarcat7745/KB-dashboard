name: collect-google-daily

# 매일 KST 06:00 (= UTC 21:00 전날) 자동 실행 + 수동 실행 버튼
on:
  schedule:
    - cron: "0 21 * * *"   # UTC 기준!! 21:00 UTC = 06:00 KST
  workflow_dispatch: {}     # Actions 탭에서 "Run workflow" 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install google-ads google-cloud-bigquery pandas pyarrow db-dtypes

      - name: Run collector
        env:
          GOOGLE_DEVELOPER_TOKEN:  ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID:        ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:    ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:    ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_LOGIN_CUSTOMER_ID }}
          GOOGLE_CUSTOMER_ID:      ${{ secrets.GOOGLE_CUSTOMER_ID }}
          GCP_SA_JSON:             ${{ secrets.GCP_SA_JSON }}
