name: collect-naver-daily

on:
  schedule:
    # GitHub cron은 정시(:00) 혼잡 + 한 번이면 스킵될 때 누락 → 아침에 3번 분산(구글과 시간 어긋나게)
    # 네이버는 데이터가 빨리 확정되므로 'GitHub 스킵 대비' 중복 실행이 목적 (idempotent라 안전)
    - cron: "37 21 * * *"   # UTC 21:37 = KST 06:37  (1차)
    - cron: "57 22 * * *"   # UTC 22:57 = KST 07:57  (2차)
    - cron: "37 23 * * *"   # UTC 23:37 = KST 08:37  (출근 전 최종)
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests google-cloud-bigquery pandas pyarrow db-dtypes

      - name: Run collector
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          GCP_SA_JSON:       ${{ secrets.GCP_SA_JSON }}
        run: python collect_naver.py
