name: collect-naver-daily

# 스케줄 제거 — 정시 수집은 collect_all(통합)이 담당. 여긴 수동 재실행용.
on:
  workflow_dispatch: {}

concurrency:
  group: bq-ad-keyword-write
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests google-cloud-bigquery pandas pyarrow db-dtypes

      - name: Run collector
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          GCP_SA_JSON:       ${{ secrets.GCP_SA_JSON }}
        run: python collect_naver.py

      # 수집이 실패하면 조용히 넘어가지 않도록 GitHub 이슈로 알림 (수동 실행은 제외)
      - name: 실패 시 알림 이슈
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "⚠️ 네이버 수집 실패 ($(date -u +%F))" \
            --body "collect-naver-daily 실행이 실패했습니다. 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "이슈 생성 건너뜀"
