name: diag-campaign-mapping

# 일회성 진단용 (수동 실행 전용). 네이버 캠페인 ID↔이름 매핑 붕괴 원인 확인.
# 읽기(SELECT)만 수행하며 캠페인명/ID만 출력(비밀값 미출력).
on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: pip install google-cloud-bigquery db-dtypes

      - name: Run diagnostics
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          python - <<'PY'
          import os, json
          from google.cloud import bigquery
          from google.oauth2 import service_account
          info = json.loads(os.environ["GCP_SA_JSON"])
          creds = service_account.Credentials.from_service_account_info(info)
          c = bigquery.Client(project="kb-dashboard-499704", credentials=creds)
          def q(sql): return list(c.query(sql).result())
          T = "`kb-dashboard-499704.kb_ads.ad_keyword`"
          B = "`kb-dashboard-499704.kb_ads.ad_budget`"

          print("=== 1) 네이버 2026-06~ 캠페인 값 TOP25 (cost순) ===")
          for r in q(f"SELECT campaign, COUNT(*) n, ROUND(SUM(cost)) cost FROM {T} WHERE media='네이버' AND date>='2026-06-01' GROUP BY campaign ORDER BY cost DESC LIMIT 25"):
              print(f"  {r['campaign']!r} | n={r['n']} | cost={r['cost']}")

          print("=== 2) ad_budget 캠페인 id -> name 샘플(최대40) ===")
          for r in q(f"SELECT DISTINCT campaign_id, campaign_name FROM {B} LIMIT 40"):
              print(f"  {r['campaign_id']!r} -> {r['campaign_name']!r}")

          print("=== 3) 7월 네이버 광고비: ad_budget join 커버리지 ===")
          for r in q(f"""SELECT
                ROUND(SUM(IF(b.campaign_name IS NOT NULL, k.cost, 0))) matched_cost,
                ROUND(SUM(IF(b.campaign_name IS NULL, k.cost, 0))) unmatched_cost,
                COUNT(DISTINCT k.campaign) camps,
                COUNT(DISTINCT IF(b.campaign_name IS NULL, k.campaign, NULL)) camps_unmatched
              FROM (SELECT campaign, cost FROM {T} WHERE media='네이버' AND date>='2026-07-01') k
              LEFT JOIN (SELECT DISTINCT campaign_id, campaign_name FROM {B}) b
                ON k.campaign = b.campaign_id"""):
              print(f"  matched_cost={r['matched_cost']} | unmatched_cost={r['unmatched_cost']} | distinct_camps={r['camps']} | unmatched_camps={r['camps_unmatched']}")

          print("=== 4) 참고: 네이버 campaign 값이 'cmp-'로 시작하는 비율(2026-06~) ===")
          for r in q(f"SELECT COUNTIF(STARTS_WITH(campaign,'cmp-')) cmp_rows, COUNT(*) total, ROUND(SUM(IF(STARTS_WITH(campaign,'cmp-'),cost,0))) cmp_cost FROM {T} WHERE media='네이버' AND date>='2026-06-01'"):
              print(f"  cmp_rows={r['cmp_rows']}/{r['total']} | cmp_cost={r['cmp_cost']}")
          print("=== DONE ===")
          PY
