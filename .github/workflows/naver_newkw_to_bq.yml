name: naver-newkw-to-bq

# 신규 키워드(regTm 기준) → BigQuery new_kw 자동 적재. 대시보드 '신규 키워드 추적' 탭 소스.
on:
  schedule:
    - cron: "20 21 * * *"   # 매일 06:20 KST(21:20 UTC) — 광고수집 이후
  workflow_dispatch:
    inputs:
      cutoff:
        description: "등록일 기준(이 날짜 이후 등록분)"
        required: false
        default: "2026-07-23"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests pandas google-cloud-bigquery google-auth pyarrow db-dtypes
      - name: 신규키워드 BQ 적재
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          GCP_SA_JSON:       ${{ secrets.GCP_SA_JSON }}
          CUTOFF:            ${{ inputs.cutoff || '2026-07-23' }}
        run: python naver_newkw_to_bq.py
