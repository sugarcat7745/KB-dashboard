name: collect-meta

# 메타(Facebook·Instagram) 광고 일별 성과를 매일 수집 → BigQuery(ad_etc, media='메타').
on:
  schedule:
    - cron: "40 19 * * *"     # UTC 19:40 = KST 04:40 (전일 집계 안정화 후)
  workflow_dispatch: {}

concurrency:
  group: bq-ad-etc-write       # ad_etc 동시 쓰기 방지
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests pandas google-cloud-bigquery google-auth pyarrow db-dtypes
      - name: 메타 수집
        env:
          META_ACCESS_TOKEN:  ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_START_DATE:    ${{ secrets.META_START_DATE }}
          GCP_SA_JSON:        ${{ secrets.GCP_SA_JSON }}
        run: python collect_meta.py
