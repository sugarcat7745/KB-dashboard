name: naver-kw-stats

# 네이버 키워드 성과·입찰 전량 조회(읽기 전용, 소진 상향 분석용).
on:
  workflow_dispatch:
    inputs:
      days:
        description: "성과 조회 일수"
        required: false
        default: "30"
      only_on:
        description: "켜진 것만? (yes 권장)"
        required: false
        default: "yes"
      exclude_name:
        description: "이름에 이 문자열 든 캠페인 제외"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 키워드 성과 조회
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          DAYS: ${{ inputs.days }}
          ONLY_ON: ${{ inputs.only_on == 'no' && '0' || '1' }}
          EXCLUDE_NAME: ${{ inputs.exclude_name }}
        run: python naver_kw_stats.py
