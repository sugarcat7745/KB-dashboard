name: collect-all

# 외부 스케줄러(cron-job.org 등)가 매일 정시에 '한 번' 찔러 네이버+구글을 순서대로 수집.
# GitHub 자체 예약(cron)은 무료플랜에서 몇 시간씩 밀려 '출근 시각 보장'이 안 되므로,
# 정시 실행이 확실한 외부 시계가 이 워크플로를 workflow_dispatch로 즉시 실행시킨다.
# (기존 collect_naver/collect_google의 cron은 공짜 백업으로 그대로 유지)
on:
  workflow_dispatch: {}

concurrency:
  group: bq-ad-keyword-write      # 개별 수집기와 같은 그룹 → 동시 쓰기 방지
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests google-ads google-cloud-bigquery pandas pyarrow db-dtypes

      - name: 네이버 수집
        id: naver
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          GCP_SA_JSON:       ${{ secrets.GCP_SA_JSON }}
        run: python collect_naver.py

      - name: 구글 수집
        id: google
        if: ${{ !cancelled() }}      # 네이버가 실패해도 구글은 시도
        env:
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_LOGIN_CUSTOMER_ID }}
          GOOGLE_CUSTOMER_ID: ${{ secrets.GOOGLE_CUSTOMER_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: python collect_google.py

      # 둘 중 하나라도 실패하면 조용히 넘어가지 않도록 GitHub 이슈로 알림
      - name: 실패 시 알림 이슈
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "⚠️ 아침 수집(collect-all) 실패 ($(date -u +%F))" \
            --body "네이버=${{ steps.naver.outcome }}, 구글=${{ steps.google.outcome }}. 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "이슈 생성 건너뜀"
