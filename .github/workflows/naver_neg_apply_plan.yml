name: naver-neg-apply-plan

# 제외키워드 플랜(전역+카테고리별, 검색어보고서 근거) 일괄 적용.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "실제 적용? (no=드라이런 / yes=적용)"
        required: true
        default: "no"
      only_on:
        description: "켜진 것만? (yes 권장)"
        required: false
        default: "yes"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 제외키워드 플랜 적용
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          APPLY:   ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_ON: ${{ inputs.only_on == 'no' && '0' || '1' }}
        run: python naver_neg_apply_plan.py
