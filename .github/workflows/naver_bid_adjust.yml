name: naver-bid-adjust

# 네이버 키워드 감축 실행안 적용(입찰 감액 / 일시정지).
# apply=no(기본): 드라이런(바뀔 내용만 출력). apply=yes: 실제 적용.
# 켜져 있는(userLock 해제) 캠페인·그룹·키워드만 대상.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "실제 적용? (no=드라이런 / yes=적용)"
        required: true
        default: "no"
      only_on:
        description: "켜진 것만 대상? (yes 권장)"
        required: false
        default: "yes"
      exclude_name:
        description: "이름에 이 문자열 든 캠페인 제외(예: 신채널)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 키워드 감축
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          APPLY: ${{ inputs.apply == 'yes' && '1' || '0' }}
          ONLY_ON: ${{ inputs.only_on == 'no' && '0' || '1' }}
          EXCLUDE_NAME: ${{ inputs.exclude_name }}
        run: python naver_bid_adjust.py
