name: naver-hourly

# 네이버 시간대별 평균 소진(읽기 전용) — '평소 몇 시까지 얼마 타는지' 기준.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "최근 며칠 평균?"
        required: false
        default: "14"
      weekday:
        description: "평일만? (yes/no)"
        required: false
        default: "no"
      only_on:
        description: "켜진 것만? (yes 권장)"
        required: false
        default: "yes"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: 시간대별 소진
        env:
          NAVER_API_KEY:     ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY:  ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          DAYS: ${{ inputs.days }}
          WEEKDAY: ${{ inputs.weekday == 'yes' && '1' || '0' }}
          ONLY_ON: ${{ inputs.only_on == 'no' && '0' || '1' }}
        run: python naver_hourly.py
